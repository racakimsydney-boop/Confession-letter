<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Wella 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
    overflow: hidden;
    text-align: center;
    color: #333;
}

.page {
    display: none;
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    padding: 20px;
}

.active {
    display: block;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    background-color: #ff6f91;
    color: white;
    font-size: 1em;
    cursor: pointer;
}

button:hover {
    background-color: #ff3e6c;
}

input {
    padding: 10px;
    border-radius: 15px;
    border: none;
    text-align: center;
}

.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
}

/* Hearts */
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

/* Letter style */
#letter {
    max-width: 700px;
    margin: auto;
    text-align: left;
    font-size: 1.1em;
    line-height: 1.6;
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/5hIuK1b1F6A?autoplay=1&loop=1&playlist=5hIuK1b1F6A"
allow="autoplay">
</iframe>

<!-- LOGIN -->
<div id="login" class="page active">
    <h1>Enter Password 💌</h1>
    <input type="password" id="password" placeholder="Enter here..." />
    <br><br>
    <button onclick="checkPassword()">Enter</button>
    <br><br>
    <button onclick="playMusic()">Play Music 🎶</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page">
    <h1>For Wella 💌</h1>
    <div class="footer">From Kimshii 💖</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
    <h1>Are you ready to read this? 🥺</h1>
    <button onclick="yesClicked()">Yes 💗</button>
    <button id="noBtn" onmouseover="moveNo()">No 😢</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <h1>My Letter 💖</h1>
    <p id="letter"></p>
</div>

<script>
// PASSWORD
function checkPassword() {
    let pass = document.getElementById("password").value;
    if (pass === "Wella Prajes") {
        goToPage("page1");
        setTimeout(() => goToPage("page2"), 2500);
    } else {
        alert("Wrong password 😢");
    }
}

// NAV
function goToPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// YES
function yesClicked() {
    goToPage("page3");
    launchConfetti();
    setTimeout(typeWriter, 500);
}

// RUNNING NO 😂
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.left = Math.random() * 80 + "%";
    btn.style.top = Math.random() * 80 + "%";
}

// 💌 YOUR LETTER (formatted)
const message = `Baii, now na human na ang klase, and we won't be able to see each other for 2 months. I just wanted to say thank you for everything you've done for me. I guess the reason why God made us friends is so we could have an encouragement buddy when life gets tough. Even though it's just simple encouragement, it has a big impact on me, and I wanted you to know that I'm very happy that we've met. I hope sa G-12 we will still be friends.

And baii, diba ning ana ka sauna nga dli nako iingon kung unsa akong na feel because maulaw ka? Soooo, karon pwede na ba? Yess, I like you very, very much. It started as a joke, but who would've thought it'll be real HAHAHHA. Mary Jane knows about it, and honestly, she just laughed at my face. I still remember that day, December 25, 2 am in the morning. I took all the courage I had and got myself ready to confess, but you said something that broke my confidence. That's why when you asked me if I like you, I said "Secret" because I'm not sure what would be my reaction if you'll reject me. But yeah, it's in the past, and now I wanted to let these things out. I want to say those words I can't tell you in person. I always knew I don't have karapatan, you know HAHAHHA, but it hurts when we talk about your ex or someone HAHAHAH. It's weird because I'm jealous. Weird, right?

But yeah, I respect your decision when you say "Let's be friends, dae" and it's a valid reason. You know you don't need to explain everything, but I appreciate what you did. Maybe I will admire you until my feelings fade. I'm not a showy type of person, but I can proudly say you're my crush. Our classmates knew that I like you.

I hope you'll find a man who will love and cherish you, a man who will do anything for you, the one who will draw a smile on your pretty face and care for you. Sometimes I kinda wish to be that man, but we knew that's impossible. That is why I am here, sending my best wishes for you. I know these words aren't enough to say everything to you. There's more I wanted to tell you, like sometimes I'm fighting with myself and making a hard decision if mo chat ba kos imoha, or dli nalang kay basin busy ka, everytime naay mag message mag dali² jud dayun kog open sa messenger kay basin ikaw to, pag mag my day ko always nako Gina check if na view naba nimo, and tanan parinig sa notes nako baii, para sb tos imo HAHAHAH dibaaa, like ngano mani? And also, tung time na grabe nimo ka cold, I broke into pieces charr HAHAHHA promise baii, mura jud kog gibulagan ato na time, as in grabe jud nako ka sad. Then kadto pajud na time kay naay summative pagka ugma, then akong cousin kay nag problema na kay wla pako nag study kay nag emot² pamn HAHAHHAHA, ka isog nako karon oii, I don't know what is your reaction after this, ikaw na bahala.

Sooo, karon murag tama na siguro na baii nohh, taas namn kaayu HAHAHAHHA. This is the last time I'll say this, "Thank you for being a big part of my senior high school babeeeeee🥹"`;

// TYPEWRITER
let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("letter").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 20);
    }
}

// HEARTS
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 400);

// CONFETTI
function launchConfetti() {
    for (let i = 0; i < 80; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["#ff6f91","#ff3e6c","#ffc0cb"][Math.floor(Math.random()*3)];
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

// MUSIC FIX
function playMusic() {
    let iframe = document.getElementById("music");
    iframe.src += "&mute=0";
}
</script>

</body>
</html>
